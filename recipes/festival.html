<body>
    <h1>Festival</h1>
    <p>A Jamaican fried dough dish</p>
    <h3>Ingredients</h3>
    <ul>
        <li>1 ½ cups all-purpose flour</li>
        <li>½ cup fine cornmeal</li>
        <li>6 Tablespoons granulated sugar</li>
        <li>2 teaspoons baking powder</li>
        <li>1 teaspoon vanilla extract</li>
        <li> ½ teaspoon salt</li>
        <li>3/4 Cup of Milk</li>
        <li>Oil for deep frying*</li>
    </ul>
    <img src="../images/festival.jpg" style="width: 300px; height: 300px;">
</body>
